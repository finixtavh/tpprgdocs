site_name: TPPRPG Docs
site_description: Documentación técnica del RPG modular
site_author: FN

theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight

plugins:
  - search

nav:
  - Inicio: index.md
  - Core:
      - Main Game: MainGame.md
      - Setup & Base Stats: Modules/ModulesUtils/setup.md

  - Sistemas Funcionales:
      - Base System: Modules/ModulesFunctions/BaseSystem.md
      - Companion System: Modules/ModulesFunctions/CompanionSystem.md
      - Crafting System: Modules/ModulesFunctions/CraftingSystem.md
      - Enchantment System: Modules/ModulesFunctions/EnchantmentSystem.md
      - Equipment System: Modules/ModulesFunctions/EquipmentSystem.md
      - Gathering Mastery: Modules/ModulesFunctions/GatheringMasterySystem.md
      - Guild System (Grand Strategy): Modules/ModulesFunctions/GuildSystem.md
      - Guild Missions: Modules/ModulesFunctions/GuildMissions.md
      - Guild Skill Tree: Modules/ModulesFunctions/GuildSkillTree.md
      - Item Browser: Modules/ModulesFunctions/ItemBrowser.md
      - Mastery System: Modules/ModulesFunctions/MasterySystem.md
      - Quest System: Modules/ModulesFunctions/QuestSystem.md
      - Save System: Modules/ModulesFunctions/SaveSystem.md
      - Skill Tree System: Modules/ModulesFunctions/SkillTreeSystem.md
      - Weather System: Modules/ModulesFunctions/WeatherSystem.md

  - Gestores (Managers):
      - Item Manager: Modules/ModulesManager/ItemManager.md
      - Buff Manager: Modules/ModulesManager/BuffManager.md
      - Shop Manager: Modules/ModulesManager/ShopManager.md
      - Zone Manager: Modules/ModulesManager/ZoneManager.md

  - Menús (UI):
      - Debug Menu: Modules/ModulesMenu/DebugMenu.md
      - Guild Menu: Modules/ModulesMenu/GuildMenu.md
      - Inventory Menu: Modules/ModulesMenu/InventoryMenu.md

  - Utilidades:
      - Loader (I/O): Modules/ModulesUtils/Loader.md
      - Mod Loader: Modules/ModulesUtils/ModLoader.md
      - Input Utils: Modules/ModulesUtils/input_utils.md
      - Debug Utils: Modules/ModulesUtils/debug.md